# Node Template — repo-spec
#
# Identity for the hub's node-template deployment; node_id MUST match
# infra/catalog/node-template.yaml. Forks renaming this scaffold MUST
# regenerate both UUIDs:
#   node_id:  openssl rand -hex 16 | sed 's/\(.\{8\}\)\(.\{4\}\)\(.\{4\}\)\(.\{4\}\)\(.\{12\}\)/\1-\2-\3-\4-\5/'
#   scope_id: uuidv5(node_id, "default")
# See docs/spec/identity-model.md, docs/spec/multi-node-tenancy.md.

schema_version: "0.1.4"

node_id: "baa9148e-3245-4f7d-976b-292fd049ca38"
scope_id: "aa6a6bad-eaa7-5835-b7f7-6478caf0192d"
scope_key: "default"

intent:
  name: games
  # Identity projected to /.well-known/agent.json → the operator gallery reads it.
  #   hook  — gallery card tagline · mission — session-cognition north-star
  #   brand — { icon (Lucide NAME, SSOT for the mark), color }
  hook: "Game together, coached by AI"
  mission: "Empowering people to grow communities and knowledge around the games they love — starting with videogames. Not building games: facilitating people to play together, with AI coaching and tooling to level up their gameplay."
  brand:
    icon: "Gamepad2"
    color: "#8b5cf6"

cogni_dao:
  dao_contract: "0x6ff3c9c5a942347eceed05b82a90d6d10d514d82"
  plugin_contract: "0x838f07e4118f8ceee29d602c03156645ffccbd76"
  signal_contract: "0x885ab2df5a4dd263fcee45b7d8d6aebef72c2498"
  chain_id: "8453"
  base_url: "https://proposal.cognidao.org"

knowledge:
  database: "knowledge_games"
  remote:
    provider: dolthub
    owner: "cogni-dao"
    repo: "knowledge-games"
    url: "https://doltremoteapi.dolthub.com/cogni-dao/knowledge-games"
    custody: cogni-owned

# Activity ledger ingestion + approver allowlist.
# `approvers` gates the `(admin)/` route group and write routes under
# `/api/v1/attribution/*`. Replace with the fork's DAO-owner wallet(s) when
# spinning up a new node from this template.
activity_ledger:
  epoch_length_days: 7
  approvers:
    - "0x070075F1389Ae1182aBac722B36CA12285d0c949" # derekg1729.eth (template default)
  activity_sources:
    github:
      attribution_pipeline: cogni-v0.0
      source_refs: ["cogni-dao/games"]

payments:
  status: pending_activation

# Born-reviewable default gates. When this node is minted as a single-node fork
# (node-at-root, no `nodes:` registry) the operator's review path runs these gates
# against the repo-root `.cogni/rules/` below. The mint (`renderRepoSpec`) re-emits
# this same block onto the minted repo's identity spec — keep the two in lockstep.
# Gate set coordinated with the operator review path (Lane A). Tune per node.
gates:
  - type: review-limits
    id: review_limits
    with:
      max_changed_files: 50
      max_total_diff_kb: 1500
  - type: ai-rule
    with:
      rule_file: pr-syntropy-coherence.yaml
  - type: ai-rule
    with:
      rule_file: patterns-and-docs.yaml
  - type: ai-rule
    with:
      rule_file: repo-goal-alignment.yaml
